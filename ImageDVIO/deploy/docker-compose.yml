services:
  imagedvio:
    build:
      context: .
      args:
        FLAG: DVCTF{DUMMY_FLAG}
    ports:
      - "8080:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 256m
    environment:
      IMAGEDVIO_TIMEOUT: "8"
      IMAGEDVIO_MAX_REQUEST_BYTES: "8388608"
      IMAGEDVIO_MAX_FILES: "8"
